edition = 4

[agent]
name = "refinery-relevance"
version = "0.1.0"
description = "Refinery Relevance specialist as a Coral executable agent."
summary = "Relevance specialist for retention and priority signals."
readme = "Executable Refinery specialist. Worker owns Coral wait/send and maps to src/core/specialists/relevance."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
MODEL_NAME = { type = "string", default = "deepseek/deepseek-v4-pro" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }
REASONING_EFFORT = { type = "string", default = "low" }
REFINERY_CORAL_MAX_TURNS = { type = "string", default = "1" }

[runtimes.executable]
path = "../run-worker.sh"
arguments = ["--specialist", "relevance"]
transport = "streamable_http"
