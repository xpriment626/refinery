edition = 4

[agent]
name = "refinery-capture"
version = "0.1.0"
description = "Refinery Capture specialist as a Coral executable agent."
summary = "Capture specialist for memory refinement intake."
readme = "Executable Refinery specialist. Worker owns Coral wait/send and maps to src/core/specialists/capture."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
MODEL_NAME = { type = "string", default = "deepseek/deepseek-v4-pro" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }
REASONING_EFFORT = { type = "string", default = "low" }
REFINERY_CORAL_MAX_TURNS = { type = "string", default = "1" }

[runtimes.executable]
path = "../run-worker.sh"
arguments = ["--specialist", "capture"]
transport = "streamable_http"
