edition = 4

[agent]
name = "refinery-evidence-auditor"
version = "0.1.0"
description = "Refinery Evidence Auditor specialist as a Coral executable agent."
summary = "Evidence Auditor challenges claims against provenance."
readme = "Executable Refinery specialist using Coral Server 1.4 model proxy injection."

[agent.license]
type = "spdx"
expression = "MIT"

[[llm.proxies]]
name = "MAIN"
format.type = "OpenAI"
models = ["gpt-5.4-nano", "deepseek-v4-pro"]

[options]
MODEL_NAME = { type = "string", default = "gpt-5.4-nano" }
MODEL_BASE_URL = { type = "string", default = "https://llm.coralcloud.ai/openai/v1" }
REASONING_EFFORT = { type = "string", default = "low" }
REFINERY_CORAL_MAX_TURNS = { type = "string", default = "1" }

[runtimes.executable]
path = "../../agents/run-worker.sh"
arguments = ["--specialist", "evidence-auditor"]
transport = "streamable_http"
